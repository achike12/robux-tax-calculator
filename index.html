<!DOCTYPE html>
<html>
<head>
<title>Robux Tax Calculator</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
}

.box{
background:#1e293b;
padding:30px;
margin:auto;
width:300px;
border-radius:10px;
}

input{
padding:10px;
width:200px;
margin-top:10px;
}

button{
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Robux Tax Calculator</h1>

<div class="box">

<p>Enter Robux Amount</p>

<input type="number" id="robux">

<br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

</div>

<script>

function calculate(){

var robux = document.getElementById("robux").value;

var afterTax = robux * 0.7;

document.getElementById("result").innerHTML =
"You will receive: " + afterTax + " Robux after tax";

}

</script>

</body>
</html>
